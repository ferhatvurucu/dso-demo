ingress:
  enabled: true
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    ## allow large bom.xml uploads:
    # nginx.ingress.kubernetes.io/proxy-body-size: 10m
  hostname: dependencytrack.example.org   # note: "hostname", not "host"
  ingressClassName: ""
  tls: []
    # - secretName: dt-tls
    #   hosts:
    #     - dependencytrack.example.org

frontend:
  replicaCount: 1
  service:
    type: NodePort

apiServer:                # note: "apiServer" (capital S), not "apiserver"
  resources:
    requests:
      cpu: "1"
      memory: 3000Mi
    limits:
      cpu: "2"
      memory: 7Gi
